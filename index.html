<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf.Gym Links</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial;
background:#0d0d0d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
color:white;
}

.logo{
width:140px;
border-radius:50%;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 25px rgba(255,255,255,0.3);
}

.logo:hover{
transform:scale(1.1);
box-shadow:0 0 40px rgba(255,255,255,0.6);
}

.links{
margin-top:30px;
display:none;
flex-direction:column;
gap:15px;
animation:fade 0.4s ease;
}

.links a{
text-decoration:none;
background:#1a1a1a;
padding:14px 25px;
border-radius:12px;
color:white;
font-size:16px;
transition:0.3s;
}

.links a:hover{
background:#333;
transform:scale(1.05);
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>

</head>

<body>

<img src="images/logo.png" class="logo" onclick="toggleLinks()">

<div class="links" id="links">
<a href="https://www.instagram.com/wolfgym03?igsh=cmh3bHB4eTFqYmMz" target="_blank">Instagram</a>
<a href="https://www.facebook.com/profile.php?id=61578717016385" target="_blank">Facebook</a>
<a href="https://wolfgym03.github.io/wolf-gym-store/">Store</a>
</div>

<script>
function toggleLinks(){
let links = document.getElementById("links")

if(links.style.display === "flex"){
links.style.display = "none"
}else{
links.style.display = "flex"
}
}
</script>

</body>
</html>
